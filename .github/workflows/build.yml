# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Build, Test, & Dependency Submission

on:
  push:
  pull_request:

permissions:
  contents: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'oracle'
        cache: maven
    - name: Build with Maven
      run: mvn -B package --file pom.xml
    - name: Publish JUnit Test Report
      uses: mikepenz/action-junit-report@49b2ca06f62aa7ef83ae6769a2179271e160d8e4
      with:
        include_passed: true
        detailed_summary: true
        report_paths: '**/target/surefire-reports/TEST-*.xml'
    - name: Maven Dependency Tree Dependency Submission
      if: github.repository == 'Omegabird113/timed_typer'
      uses: advanced-security/maven-dependency-submission-action@v5.0.0
